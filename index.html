<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Tiles Tester</title>
  <link rel="stylesheet" href="./cesium/Widgets/widgets.css" />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }
    body { background: #000; color: #eee; }
    #toolbar {
      position: absolute; top: 10px; left: 10px; right: 50%; z-index: 10;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    #toolbar input, #toolbar select {
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      outline: none;
    }
    #toolbar input:focus, #toolbar select:focus { border-color: #6ab0de; }
    #url-input { flex: 1; }
    #token-input { width: 200px; }
    .field {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      white-space: nowrap;
    }
    .field label {
      color: #cfd7df;
    }
    .field select {
      padding: 0;
      border: 0;
      background: transparent;
      min-width: 180px;
    }
    button {
      padding: 8px 14px; border: 1px solid #444; border-radius: 4px;
      background: #2c3e50; color: #eee; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #34495e; }
    #inspect-panel {
      position: absolute; left: 10px; bottom: 38px; z-index: 10;
      width: min(380px, calc(100vw - 20px)); max-height: 40vh; overflow: auto;
      padding: 12px 14px; border: 1px solid #444; border-radius: 6px;
      background: rgba(0, 0, 0, .78); color: #eee; font-size: 13px;
      box-sizing: border-box;
    }
    #inspect-panel h2 {
      margin: 0 0 8px; font-size: 14px; font-weight: 600;
    }
    #inspect-panel .hint {
      color: #cfd7df;
      line-height: 1.4;
    }
    #inspect-panel .section {
      margin-top: 10px;
    }
    #inspect-panel .label {
      display: inline-block; min-width: 92px; color: #cfd7df;
    }
    #inspect-panel pre {
      margin: 6px 0 0; white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; line-height: 1.4;
    }
    @media (max-width: 900px) {
      #toolbar { right: 10px; top: 152px; }
      #url-input { flex-basis: 100%; }
      #inspect-panel { right: 10px; width: auto; }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="toolbar">
    <input id="url-input" type="text"
           placeholder="Paste tileset URL (e.g. https://.../tileset.json)" />
    <input id="token-input" type="text"
           placeholder="Ion token (optional)" />
    <div class="field">
      <label for="terrain-select">Terrain</label>
      <select id="terrain-select">
        <option value="none">None</option>
        <option value="cesium">Cesium World Terrain</option>
        <option value="pdok">PDOK Quantized Mesh</option>
      </select>
    </div>
    <button id="load-btn">Load</button>
  </div>

  <div id="inspect-panel">
    <h2>Inspector</h2>
    <div id="inspect-content" class="hint">Click the globe, terrain, or a 3D Tiles feature to inspect coordinates and feature properties.</div>
  </div>

  <script>window.CESIUM_BASE_URL = "./cesium/";</script>
  <script src="./cesium/Cesium.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
